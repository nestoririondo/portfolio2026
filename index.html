<style>
  :root{
    --bg:#f7f4ec;
    --paper:#fffdfa;
    --ink:#2c2a26;
    --muted:#766f64;
    --line:#e9e3d6;
    --ph-bg:#efeade;
    --mono:"DM Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
    /* set by tweaks at runtime */
    --accent:#7d9a83;
    --font-head:"Newsreader", Georgia, serif;
    --font-body:"Hanken Grotesk", system-ui, sans-serif;
    --accent-deep:color-mix(in oklab, var(--accent) 82%, #000);
    --accent-soft:color-mix(in oklab, var(--accent) 13%, #fff);
    --accent-tint:color-mix(in oklab, var(--accent) 6%, var(--bg));
    --accent2:#8a93a8;
    --accent2-soft:color-mix(in oklab, var(--accent2) 14%, var(--bg));
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:var(--font-body); font-size:17px; line-height:1.6;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  }
  ::selection{ background:var(--accent-soft); }
  a{color:inherit; text-decoration:none;}
  h1,h2,h3{ font-family:var(--font-head); font-weight:500; letter-spacing:-.015em; margin:0; line-height:1.08; text-wrap:balance; }
  p{ margin:0; text-wrap:pretty; }
  .wrap{ width:min(1180px, 92vw); margin:0 auto; }
  .eyebrow{
    font-family:var(--mono); font-size:12.5px; letter-spacing:.16em; text-transform:uppercase;
    color:var(--accent); display:inline-flex; align-items:center; gap:9px;
  }
  .eyebrow::before{ content:""; width:22px; height:1px; background:var(--accent); opacity:.55; }
  section{ scroll-margin-top:84px; }

  /* buttons */
  .btn{
    display:inline-flex; align-items:center; gap:9px; cursor:pointer; border:none;
    font-family:var(--font-body); font-size:16px; font-weight:600; border-radius:999px;
    padding:14px 24px; transition:transform .18s ease, box-shadow .25s ease, background .2s;
    white-space:nowrap;
  }
  .btn-primary{ background:var(--accent); color:#fff; box-shadow:0 12px 28px -12px color-mix(in oklab,var(--accent) 80%, transparent); }
  .btn-primary:hover{ background:var(--accent-deep); transform:translateY(-1px); box-shadow:0 16px 34px -12px color-mix(in oklab,var(--accent) 75%, transparent); }
  .btn-ghost{ background:transparent; color:var(--ink); border:1px solid var(--line); }
  .btn-ghost:hover{ background:var(--paper); border-color:color-mix(in oklab,var(--accent) 35%, var(--line)); transform:translateY(-1px); }

  .chip{
    display:inline-flex; align-items:center; gap:8px; padding:8px 14px; border-radius:999px;
    background:var(--paper); border:1px solid var(--line); font-size:14px; color:var(--muted); font-weight:500;
  }
  .chip svg{ color:var(--accent); }

  /* reveal on scroll */
  .reveal{ opacity:0; transform:translateY(22px); transition:opacity .7s cubic-bezier(.2,.7,.2,1), transform .7s cubic-bezier(.2,.7,.2,1); }
  .reveal.in{ opacity:1; transform:none; }
  @media (prefers-reduced-motion: reduce){ .reveal{ opacity:1; transform:none; transition:none; } html{scroll-behavior:auto;} }

  /* tasteful decorative graphics */
  @keyframes floatY{ 0%,100%{ transform:translateY(0) } 50%{ transform:translateY(-9px) } }
  @keyframes drawLine{ to{ stroke-dashoffset:0 } }
  .deco-float{ animation:floatY 8s ease-in-out infinite; will-change:transform; }
  .squiggle path{ stroke-dasharray:230; stroke-dashoffset:230; }
  .reveal.in .squiggle path{ animation:drawLine 1.05s .45s cubic-bezier(.6,0,.3,1) forwards; }
  @media (prefers-reduced-motion: reduce){ .deco-float{ animation:none; } .squiggle path{ stroke-dashoffset:0; animation:none; } }

  input,textarea{ font-family:var(--font-body); font-size:16px; }

  @media (max-width:720px){
    body{ font-size:16px; }
    .outcome-grid{ grid-template-columns:1fr !important; }
  }
</style>

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

/* ---------- Before/After drag slider ---------- */
function BeforeAfterSlider({ variant = "reb", ratio = "16 / 10" }) {
  const [pct, setPct] = useState(50);
  const [drag, setDrag] = useState(false);
  const wrap = useRef(null);

  const setFromX = useCallback((clientX) => {
    const el = wrap.current; if (!el) return;
    const r = el.getBoundingClientRect();
    let p = ((clientX - r.left) / r.width) * 100;
    p = Math.max(2, Math.min(98, p));
    setPct(p);
  }, []);

  useEffect(() => {
    if (!drag) return;
    const move = (e) => { const x = e.touches ? e.touches[0].clientX : e.clientX; setFromX(x); };
    const up = () => setDrag(false);
    window.addEventListener("mousemove", move);
    window.addEventListener("touchmove", move, { passive: false });
    window.addEventListener("mouseup", up);
    window.addEventListener("touchend", up);
    return () => {
      window.removeEventListener("mousemove", move);
      window.removeEventListener("touchmove", move);
      window.removeEventListener("mouseup", up);
      window.removeEventListener("touchend", up);
    };
  }, [drag, setFromX]);

  const start = (e) => { setDrag(true); const x = e.touches ? e.touches[0].clientX : e.clientX; setFromX(x); };

  const tag = (text, kind) => (
    <span style={{
      position: "absolute", top: 12, [kind === "before" ? "left" : "right"]: 12,
      fontFamily: "var(--mono)", fontSize: 11, letterSpacing: ".08em", textTransform: "uppercase",

      background: kind === "before" ? "rgba(40,38,34,.72)" : "var(--accent)",
      color: "#fff", backdropFilter: "blur(2px)", fontWeight: 600,
    }}>{text}</span>
  );

  return (
    <div ref={wrap}
      onMouseDown={start} onTouchStart={start}
      style={{
        position: "relative", width: "100%", aspectRatio: ratio, borderRadius: 20,
        overflow: "hidden", userSelect: "none", cursor: drag ? "grabbing" : "ew-resize",
        boxShadow: "0 30px 70px -28px rgba(60,40,25,.42), 0 2px 0 rgba(255,255,255,.5) inset",
        border: "1px solid var(--line)", touchAction: "pan-y",
      }}>
      {/* after (full, underneath) */}
      <div style={{ position: "absolute", inset: 0 }}><MiniSite kind="after" variant={variant} /></div>
      {tag("Nachher", "after")}
      {/* before (clipped to left) */}
      <div style={{ position: "absolute", inset: 0, width: pct + "%", overflow: "hidden", borderRight: "0" }}>
        <div style={{ position: "absolute", inset: 0, width: wrap.current ? wrap.current.getBoundingClientRect().width : "100%", height: "100%" }}>
          <MiniSite kind="before" variant={variant} />
        </div>
        {tag("Vorher", "before")}
      </div>
      {/* handle */}
      <div style={{ position: "absolute", top: 0, bottom: 0, left: pct + "%", transform: "translateX(-50%)", width: 2, background: "var(--paper)", zIndex: 5, boxShadow: "0 0 0 1px rgba(60,40,25,.12)" }}>
        <div style={{
          position: "absolute", top: "50%", left: "50%", transform: "translate(-50%,-50%)",
          width: 44, height: 44, borderRadius: 999, background: "var(--paper)",
          display: "grid", placeItems: "center", color: "var(--accent)",
          boxShadow: "0 8px 22px -6px rgba(60,40,25,.5)", border: "1px solid var(--line)",
        }}>
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <polyline points="9 7 4 12 9 17" /><polyline points="15 7 20 12 15 17" />
          </svg>
        </div>
      </div>
    </div>
  );
}

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const FONT_PAIRS = {
  editorial: { head:'"Newsreader", Georgia, serif', body:'"Hanken Grotesk", system-ui, sans-serif' },
  modern:    { head:'"Spectral", Georgia, serif',   body:'"DM Sans", system-ui, sans-serif' },  warm:      { head:'"Fraunces", Georgia, serif',   body:'"Figtree", system-ui, sans-serif' },

/* Calm beige base with muted pastel accents. palette = [accent, ink, bg] (drives
   the Tweak swatch); vars = the full set applied to :root. Soft cream neutrals,
   accents are dusty pastels — desaturated enough to stay calm, deep enough to
   carry white button text. */
const NEUTRAL = { '--ink':'#2c2a26','--paper':'#fffdfa','--muted':'#766f64','--line':'#e9e3d6','--ph-bg':'#efeade','--bg':'#f7f4ec','--accent2':'#8a93a8' };
const pastel = (accent, over={}) => ({ palette:[accent,'#2c2a26','#f7f4ec'], vars:{ ...NEUTRAL, '--accent':accent, ...over } });
const THEMES = [
  pastel('#7d9a83', { '--accent2':'#8a93a8' }),                  // Salbei — sage
  pastel('#7791a9', { '--accent2':'#8f9c87' }),                  // Nebelblau — dusty blue
  pastel('#9087a6', { '--accent2':'#8a9fa0' }),                  // Lavendel — soft lavender
  pastel('#b08894', { '--accent2':'#8a9fa0' }),                  // Altrosa — dusty rose

/* ---- scroll reveal hook ---- */
function useReveal(){
  useEffect(()=>{
    const els = document.querySelectorAll('.reveal');
    const io = new IntersectionObserver((ents)=>{
      ents.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target); } });
    }, { threshold:0.12, rootMargin:'0px 0px -8% 0px' });
    els.forEach(el=>io.observe(el));
    return ()=>io.disconnect();
  });
}

function DotGrid({ rows=4, cols=6, gap=15, r=2.3, color='color-mix(in oklab,var(--accent2) 55%,transparent)', style }){
  const w=(cols-1)*gap, h=(rows-1)*gap, dots=[];
  for(let y=0;y<rows;y++) for(let x=0;x<cols;x++) dots.push(<circle key={x+'-'+y} cx={x*gap} cy={y*gap} r={r} fill={color}/>);
  return <svg width={w+2*r} height={h+2*r} viewBox={`${-r} ${-r} ${w+2*r} ${h+2*r}`} style={style} aria-hidden="true">{dots}</svg>;
}

function StickyCase(){
  const [active,setActive]=useState(0);
  const wrapRef=useRef(null);
  const chapters=[
    { k:'01', label:'Vorher', title:'Eine Seite von 2009', body:'Objekte wurden von Hand eingepflegt — und waren ständig veraltet.' },
    { k:'02', label:'Jetzt', title:'Direkt aus der Maklersoftware', body:'Die Website zieht die Objekte live aus Propstack. Was dort steht, ist sofort online — ohne ein einziges manuelles Update.' },

  ];
  useEffect(()=>{
    const nodes=wrapRef.current && wrapRef.current.querySelectorAll('[data-idx]'); if(!nodes) return;

      ents.forEach(e=>{ if(e.isIntersecting) setActive(Number(e.target.getAttribute('data-idx'))); });

  useEffect(()=>{
    const sec = secRef.current; if(!sec) return;
    if(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
    const layers = [...sec.querySelectorAll('[data-px]')];
    let raf = 0;
    const update = () => {
      raf = 0;
      const rect = sec.getBoundingClientRect();
      const center = rect.top + rect.height/2 - window.innerHeight/2;
      layers.forEach(el=>{
        const sp = parseFloat(el.getAttribute('data-px')) || 0;
        el.style.transform = `translate3d(0, ${(center * sp).toFixed(1)}px, 0)`;
      });
    };
    const onScroll = () => { if(!raf) raf = requestAnimationFrame(update); };
    update();
    window.addEventListener('scroll', onScroll, { passive:true });
    window.addEventListener('resize', onScroll);
    return ()=>{ window.removeEventListener('scroll', onScroll); window.removeEventListener('resize', onScroll); cancelAnimationFrame(raf); };
  },[]);

  return (
    <section ref={secRef} id="software" style={{ position:'relative', overflow:'hidden', background:'var(--ink)', color:'#fff', padding:'clamp(64px,9vw,120px) 0' }}>
      {/* parallax orbs */}
      <div aria-hidden="true" style={{ position:'absolute', inset:0, pointerEvents:'none' }}>
        <div data-px="0.16" style={{ position:'absolute', top:'6%', left:'-6%', width:'42vw', height:'42vw', maxWidth:560, maxHeight:560, borderRadius:'50%', background:'radial-gradient(circle at 35% 35%, color-mix(in oklab,var(--accent) 55%,transparent), transparent 68%)', filter:'blur(20px)', opacity:.55 }}></div>
        <div data-px="-0.12" style={{ position:'absolute', bottom:'2%', right:'-8%', width:'46vw', height:'46vw', maxWidth:620, maxHeight:620, borderRadius:'50%', background:'radial-gradient(circle at 60% 40%, color-mix(in oklab,var(--accent) 42%,#000 8%), transparent 66%)', filter:'blur(26px)', opacity:.5 }}></div>
        <div data-px="0.1" style={{ position:'absolute', top:'40%', right:'30%', width:'18vw', height:'18vw', maxWidth:230, maxHeight:230, borderRadius:'50%', background:'radial-gradient(circle, color-mix(in oklab,var(--accent) 35%,transparent), transparent 70%)', filter:'blur(18px)', opacity:.45 }}></div>
      </div>

      <div className="wrap" style={{ position:'relative' }}>
        <div className="reveal" style={{ maxWidth:740, marginBottom:'clamp(36px,5vw,60px)' }}>
          <span className="eyebrow" style={{ color:'color-mix(in oklab,var(--accent) 60%,#fff)' }}>Was Ihre Website für Sie tut</span>
          <h2 style={{ fontSize:'clamp(31px,4.2vw,50px)', marginTop:16, color:'#fff' }}>Sie führen Ihr Geschäft. Die Website erledigt den Rest.</h2>
        </div>

        <div className="reveal outcome-grid" style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'clamp(54px,7vw,78px) clamp(16px,2vw,26px)' }}>
          {OUTCOMES.map(o => <OutcomeCard key={o.n} o={o} />)}

/* ===================== APP ===================== */
function App(){
  const [t,setTweak] = useTweaks(TWEAK_DEFAULTS);
  useReveal();
  const pair = FONT_PAIRS[t.fontPair] || FONT_PAIRS.editorial;
  const theme = THEMES.find(th=>JSON.stringify(th.palette)===JSON.stringify(t.palette)) || THEMES[0];
  const rootStyle = { ...theme.vars, '--font-head':pair.head, '--font-body':pair.body };
  useEffect(()=>{
    const r = document.documentElement.style;
    Object.entries({ ...theme.vars, '--font-head':pair.head, '--font-body':pair.body })
      .forEach(([k,v])=>r.setProperty(k,v));
  }, [t.palette, t.fontPair]);

  return (
    <div style={rootStyle}>
      <Header />
      <main>
        <Hero layout={t.heroLayout} />
        <Arbeiten />
        <Software />
        <Angebot />
        <Ueber />
        <Kontakt />
      </main>
      <Footer />

      <TweaksPanel>
        <TweakSection label="Farbkombination" />
        <TweakColor label="Palette" value={t.palette}
          options={THEMES.map(th=>th.palette)}
          onChange={v=>setTweak('palette',v)} />
        <TweakSection label="Typografie" />
        <TweakRadio label="Schrift-Paar" value={t.fontPair}
          options={['editorial','modern','warm']}
          onChange={v=>setTweak('fontPair',v)} />
        <TweakSection label="Layout" />
        <TweakRadio label="Hero" value={t.heroLayout}
          options={['split','centered']}
          onChange={v=>setTweak('heroLayout',v)} />
      </TweaksPanel>
    </div>
  );
}

function boot(){
  if(!(window.useTweaks && window.Icon && window.TallBrowser && window.RebDesktop && window.KompassApp && window.TweaksPanel)){
    return setTimeout(boot, 25);
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
}
boot();
